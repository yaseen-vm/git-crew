name: 'git-crew AI Code Reviewer'
description: >
  Reviews every PR for security vulnerabilities, architecture issues, and performance
  bottlenecks. Uses LangGraph (orchestration) + CrewAI (3 specialist crews, run in
  parallel) + Groq LLM. Posts findings as a PR comment and optionally uploads SARIF
  to GitHub Code Scanning.

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  llm-provider:
    description: >
      LLM provider to use.
      Supported: groq | openai | anthropic | ollama | azure | mistral | google | openrouter | together
      Default: groq (free tier available at https://console.groq.com)
    required: false
    default: 'groq'
  llm-model:
    description: >
      Override the provider's default model (optional).
      Example: gpt-4o, claude-3-5-sonnet-20241022, llama-3.3-70b-versatile
    required: false
    default: ''
  api-key:
    description: >
      API key for the selected LLM provider.
      Store it as a repository secret and pass it here.
      Not needed for LLM_PROVIDER=ollama (local).
    required: false
    default: ''
  github-token:
    description: >
      GitHub token for fetching the PR diff and posting the review comment.
      Defaults to the built-in GITHUB_TOKEN — no extra setup needed.
    required: false
    default: ${{ github.token }}
  post-comment:
    description: 'Post the review as a PR comment (true/false). Default: true.'
    required: false
    default: 'true'
  upload-sarif:
    description: >
      Upload a SARIF file to GitHub Code Scanning (true/false).
      Findings appear in Security → Code scanning with inline annotations.
      Requires the repository to have Code Scanning enabled.
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install git-crew
      shell: bash
      run: pip install "${{ github.action_path }}[all-providers]"

    - name: Run review
      shell: bash
      env:
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        LLM_MODEL: ${{ inputs.llm-model }}
        # Route the single api-key input to the right env var for the chosen provider
        GROQ_API_KEY: ${{ inputs.llm-provider == 'groq' && inputs.api-key || '' }}
        OPENAI_API_KEY: ${{ inputs.llm-provider == 'openai' && inputs.api-key || '' }}
        ANTHROPIC_API_KEY: ${{ inputs.llm-provider == 'anthropic' && inputs.api-key || '' }}
        MISTRAL_API_KEY: ${{ inputs.llm-provider == 'mistral' && inputs.api-key || '' }}
        GOOGLE_API_KEY: ${{ inputs.llm-provider == 'google' && inputs.api-key || '' }}
        OPENROUTER_API_KEY: ${{ inputs.llm-provider == 'openrouter' && inputs.api-key || '' }}
        TOGETHER_API_KEY: ${{ inputs.llm-provider == 'together' && inputs.api-key || '' }}
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
      run: |
        PR="${{ github.event.pull_request.number }}"
        ARGS="--no-interactive"
        [[ "${{ inputs.post-comment }}" == "true" ]] && ARGS="$ARGS --post-comment"
        [[ "${{ inputs.upload-sarif }}" == "true" ]] && ARGS="$ARGS --sarif results.sarif"
        git-crew pr "$PR" $ARGS

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
        category: git-crew
