name: 'git-crew AI Code Reviewer'
description: >
  Reviews every PR for security vulnerabilities, architecture issues, and performance
  bottlenecks. Uses LangGraph (orchestration) + CrewAI (3 specialist crews) + Groq LLM.
  Posts findings as a PR comment.

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  groq-api-key:
    description: >
      Groq API key — free at https://console.groq.com.
      Store as a repository secret named GROQ_API_KEY.
    required: true
  github-token:
    description: >
      GitHub token used to fetch the PR diff and post the review comment.
      Defaults to the built-in GITHUB_TOKEN — no extra setup needed.
    required: false
    default: ${{ github.token }}
  post-comment:
    description: 'Post the review as a PR comment (true/false). Default: true.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install git-crew
      shell: bash
      # Install from the action's own directory so the version always matches the action tag.
      run: pip install "${{ github.action_path }}"

    - name: Run review
      shell: bash
      env:
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        GH_TOKEN: ${{ inputs.github-token }}
        # GH_REPO lets `gh pr diff` find the right repo without a local checkout.
        GH_REPO: ${{ github.repository }}
      run: |
        PR="${{ github.event.pull_request.number }}"
        if [[ "${{ inputs.post-comment }}" == "true" ]]; then
          git-crew pr "$PR" --no-interactive --post-comment
        else
          git-crew pr "$PR" --no-interactive
        fi
