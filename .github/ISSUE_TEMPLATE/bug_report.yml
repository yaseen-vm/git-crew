name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `git-crew review HEAD~1..HEAD`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: git-crew version
      placeholder: "0.1.0"

  - type: dropdown
    id: python
    attributes:
      label: Python version
      options: ["3.11", "3.12", "3.13"]

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / stack trace
      render: shell
