# ─────────────────────────────────────────────────────────────────────────────
# git-crew AI Code Review — workflow template
#
# HOW TO USE:
#   1. Copy this file to  .github/workflows/git-crew-review.yml  in your repo.
#   2. Add your Groq API key as a repository secret named GROQ_API_KEY.
#      (Settings → Secrets and variables → Actions → New repository secret)
#   3. Open a PR — git-crew will review it and post findings as a comment.
#
# GROQ_API_KEY: free at https://console.groq.com
# ─────────────────────────────────────────────────────────────────────────────

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  git-crew-review:
    name: git-crew review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write      # post review comment
      security-events: write    # upload SARIF to Code Scanning (optional)

    steps:
      - name: Review PR with git-crew
        uses: yaseen-vm/git-crew@main
        with:
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          post-comment: 'true'
          # upload-sarif: 'true'   # uncomment to enable GitHub Code Scanning integration
